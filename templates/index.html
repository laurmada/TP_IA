<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Time Pokémon</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "VT323", monospace;
      background: #1a1a2e;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 31px, rgba(255,255,255,0.03) 31px, rgba(255,255,255,0.03) 32px
      );
      color: #e8e0c8;
      padding: 2rem 1rem;
      font-size: 18px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .titulo {
      font-family: "Press Start 2P", monospace;
      font-size: 14px;
      color: #f8d030;
      text-shadow: 3px 3px 0 #b8900a;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .subtitle {
      font-size: 16px;
      color: #9090a8;
      margin-bottom: 1.5rem;
    }

    .controls {
      background: #16213e;
      border: 3px solid #4a90d9;
      box-shadow: 4px 4px 0 #1a3a6e;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .controls label { font-size: 18px; color: #e8e0c8; }

    select {
      height: 36px;
      border: 2px solid #4a90d9;
      background: #0f3460;
      color: #e8e0c8;
      padding: 0 8px;
      font-size: 16px;
      font-family: "VT323", monospace;
    }

    button {
      background: #cc0000;
      color: #fff;
      border: none;
      border-bottom: 4px solid #880000;
      border-right: 4px solid #880000;
      padding: 8px 20px;
      font-size: 16px;
      font-family: "Press Start 2P", monospace;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s;
    }

    button:active {
      transform: translate(2px, 2px);
      border-bottom: 2px solid #880000;
      border-right: 2px solid #880000;
    }

    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .section-label {
      font-family: "Press Start 2P", monospace;
      font-size: 9px;
      color: #f8d030;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .pokemon-card {
      background: #16213e;
      border: 2px solid #4a90d9;
      box-shadow: 3px 3px 0 #1a3a6e;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .pokemon-img {
      width: 64px;
      height: 64px;
      image-rendering: pixelated;
    }

    .pokemon-name {
      font-size: 16px;
      font-weight: 400;
      text-transform: capitalize;
      color: #e8e0c8;
      text-align: center;
    }

    .types-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .type-badge {
      font-size: 13px;
      padding: 1px 7px;
      font-weight: 400;
      font-family: "VT323", monospace;
      text-transform: capitalize;
      border: 1px solid rgba(0,0,0,0.3);
    }

    .fitness-box {
      background: #16213e;
      border: 2px solid #f8d030;
      box-shadow: 3px 3px 0 #b8900a;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 18px;
    }

    .fitness-box strong {
      font-size: 22px;
      color: #f8d030;
    }

    .ginasio-card {
      background: #16213e;
      border: 2px solid #4a90d9;
      box-shadow: 3px 3px 0 #1a3a6e;
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
    }

    .ginasio-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .ginasio-titulo { font-size: 20px; color: #e8e0c8; }
    .ginasio-tipo { font-size: 15px; color: #9090a8; text-transform: capitalize; }

    .resultado-badge {
      font-family: "Press Start 2P", monospace;
      font-size: 8px;
      padding: 5px 10px;
      letter-spacing: 1px;
    }

    .resultado-vitoria { background: #2a5a10; color: #a8e060; border: 2px solid #a8e060; }
    .resultado-empate  { background: #5a4a00; color: #f8d030; border: 2px solid #f8d030; }
    .resultado-derrota { background: #5a1010; color: #f06060; border: 2px solid #f06060; }

    .scores-row {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 16px;
      color: #9090a8;
    }

    .scores-row strong { color: #e8e0c8; }

    .ginasio-pokemons { display: flex; gap: 8px; flex-wrap: wrap; }

    .ginasio-pokemon-mini {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #0f3460;
      border: 1px solid #4a90d9;
      padding: 2px 8px 2px 2px;
    }

    .ginasio-pokemon-mini img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
    }

    .ginasio-pokemon-mini span {
      font-size: 15px;
      text-transform: capitalize;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #f8d030;
      font-family: "Press Start 2P", monospace;
      font-size: 10px;
      line-height: 2;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="titulo">GERADOR DE<br>TIME POKÉMON</div>
    <div class="controls">
      <label for="qtd-ginasios">Ginásios:</label>
      <select id="qtd-ginasios">
        <option value="0">Aleatório</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
      <button id="btn-gerar" onclick="gerarTime()">▶ GERAR</button>
    </div>

    <div id="resultado" class="hidden">
      <p class="section-label">▸ Melhor time</p>
      <div class="team-grid" id="team-grid"></div>

      <div class="fitness-box">
        <span>Fitness total</span>
        <strong id="fitness-valor">-</strong>
      </div>

      <p class="section-label">▸ Resultado por ginásio</p>
      <div id="ginasios-list"></div>
    </div>

    <div id="loading" class="loading hidden">
      CALCULANDO...<br>aguarde
    </div>
  </div>

  <script>
    function spriteUrl(id) {
      return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
    }

    const tipoCores = {
      "normal":   { bg: "#c8c4bc", texto: "#3a3a32" },
      "fogo":     { bg: "#f08030", texto: "#5a1a00" },
      "agua":     { bg: "#6890f0", texto: "#0a1a60" },
      "eletrico": { bg: "#f8d030", texto: "#4a3a00" },
      "grama":    { bg: "#78c850", texto: "#1a4a00" },
      "gelo":     { bg: "#98d8d8", texto: "#0a4040" },
      "lutador":  { bg: "#c03028", texto: "#fff" },
      "venenoso": { bg: "#a040a0", texto: "#fff" },
      "terra":    { bg: "#e0c068", texto: "#3a2800" },
      "voador":   { bg: "#a890f0", texto: "#1a0860" },
      "psiquico": { bg: "#f85888", texto: "#5a0020" },
      "inseto":   { bg: "#a8b820", texto: "#2a3000" },
      "pedra":    { bg: "#b8a038", texto: "#2a2000" },
      "fantasma": { bg: "#705898", texto: "#fff" },
      "dragao":   { bg: "#7038f8", texto: "#fff" },
      "aco":      { bg: "#b8b8d0", texto: "#202040" },
      "fada":     { bg: "#ee99ac", texto: "#5a0020" },
      "noturno":  { bg: "#705848", texto: "#fff" },
    };

    function tipoBadge(tipo) {
      const cor = tipoCores[tipo] || { bg: "#888", texto: "#fff" };
      return `<span class="type-badge" style="background:${cor.bg}; color:${cor.texto};">${tipo}</span>`;
    }

    function resultadoClasse(resultado) {
      if (resultado === "Vitória") return "resultado-vitoria";
      if (resultado === "Empate") return "resultado-empate";
      return "resultado-derrota";
    }

    async function gerarTime() {
      const qtd = parseInt(document.getElementById("qtd-ginasios").value);
      const btn = document.getElementById("btn-gerar");
      const resultado = document.getElementById("resultado");
      const loading = document.getElementById("loading");

      btn.disabled = true;
      resultado.classList.add("hidden");
      loading.classList.remove("hidden");

      try {
        const response = await fetch("/gerar-time", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ quantidade: qtd })
        });

        const data = await response.json();

        const teamGrid = document.getElementById("team-grid");
        teamGrid.innerHTML = data.time.map(p => `
          <div class="pokemon-card">
            <img class="pokemon-img" src="${spriteUrl(p.id)}" alt="${p.nome}">
            <span class="pokemon-name">${p.nome}</span>
            <div class="types-row">
              ${p.tipos.map(t => tipoBadge(t)).join("")}
            </div>
          </div>
        `).join("");

        document.getElementById("fitness-valor").textContent = data.fitness.toFixed(2);

        const ginasiosList = document.getElementById("ginasios-list");
        ginasiosList.innerHTML = data.ginasios.map(g => `
          <div class="ginasio-card">
            <div class="ginasio-header">
              <div>
                <div class="ginasio-titulo">${g.nome}</div>
                <div class="ginasio-tipo">${g.tipo}</div>
              </div>
              <span class="resultado-badge ${resultadoClasse(g.resultado)}">${g.resultado}</span>
            </div>
            <div class="scores-row">
              <span>time: <strong>${g.score_time.toFixed(0)}</strong></span>
              <span>ginásio: <strong>${g.score_ginasio.toFixed(0)}</strong></span>
            </div>
            <div class="ginasio-pokemons">
              ${g.pokemons.map(p => `
                <div class="ginasio-pokemon-mini">
                  <img src="${spriteUrl(p.id)}" alt="${p.nome}">
                  <span>${p.nome}</span>
                </div>
              `).join("")}
            </div>
          </div>
        `).join("");

        resultado.classList.remove("hidden");
      } catch (erro) {
        alert("Erro ao gerar o time.");
        console.error(erro);
      } finally {
        btn.disabled = false;
        loading.classList.add("hidden");
      }
    }
  </script>
</body>
</html>
